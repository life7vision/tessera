<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tessera{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">

      <a href="/" class="site-brand" aria-label="Tessera ana sayfa">
        <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
          <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#cad72d"/>
          <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#0f9e79"/>
          <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#d86b42"/>
          <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#3d88d9"/>
        </svg>
        <div class="site-brand-text">
          <span class="site-brand-name">Tessera</span>
          <span class="site-brand-tag">The Digital Vault</span>
        </div>
      </a>

      <div class="site-header-fill">
        {% block nav_search %}{% endblock %}
      </div>

      <nav class="site-nav" aria-label="Sayfa navigasyonu">
        <a href="/" class="site-nav-link{% if active == 'home' %} active{% endif %}">Ara</a>
        <a href="/forge" class="site-nav-link{% if active == 'forge' %} active{% endif %}">Forge</a>
        <a href="/archiver" class="site-nav-link{% if active == 'archiver' %} active{% endif %}">Mosaic</a>
        <a href="/settings" class="site-nav-link site-nav-icon{% if active == 'settings' %} active{% endif %}"
           aria-label="Ayarlar" title="Ayarlar">
          <svg viewBox="0 0 16 16" width="15" height="15" fill="none"
               stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/>
          </svg>
        </a>
      </nav>

    </div>
  </header>

  <main class="shell">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
