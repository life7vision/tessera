<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tessera{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand" aria-label="Tessera ana sayfa">
      <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#cad72d"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#0f9e79"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#d86b42"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#3d88d9"/>
      </svg>
      <span>Tessera</span>
    </a>

    <div class="nav-fill">
      {% block nav_search %}{% endblock %}
    </div>

    <nav class="nav-links" aria-label="Sayfa navigasyonu">
      <a href="/" class="{% if active == 'home' %}active{% endif %}">Ara</a>
      <a href="/forge" class="{% if active == 'forge' %}active{% endif %}">Forge</a>
      <a href="/archiver" class="{% if active == 'archiver' %}active{% endif %}">Mosaic</a>
      <a href="/settings" class="{% if active == 'settings' %}active{% endif %}">Ayarlar</a>
    </nav>
  </nav>

  <main class="shell">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
