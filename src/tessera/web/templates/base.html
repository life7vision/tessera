<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tessera{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">

      <a href="/" class="site-brand" aria-label="Tessera ana sayfa">
        <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
          <rect x="1" y="1" width="7" height="7" rx="1.5" fill="#cad72d"/>
          <rect x="10" y="1" width="7" height="7" rx="1.5" fill="#0f9e79"/>
          <rect x="1" y="10" width="7" height="7" rx="1.5" fill="#d86b42"/>
          <rect x="10" y="10" width="7" height="7" rx="1.5" fill="#3d88d9"/>
        </svg>
        <div class="site-brand-text">
          <span class="site-brand-name">Tessera</span>
          <span class="site-brand-tag">The Digital Vault</span>
        </div>
      </a>

      <div class="site-header-fill">
        {% block nav_search %}{% endblock %}
      </div>

      {# ── App switcher — Google waffle mantığı ── #}
      <div class="tsw-wrap" id="tswWrap">
        <button class="tsw-btn" id="tswBtn" aria-label="Uygulamalar" aria-expanded="false"
                aria-haspopup="true">
          <svg viewBox="0 0 18 18" width="17" height="17" aria-hidden="true">
            <rect x="1"  y="1"  width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="7"  y="1"  width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="13" y="1"  width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="1"  y="7"  width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="7"  y="7"  width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="13" y="7"  width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="1"  y="13" width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="7"  y="13" width="5" height="5" rx="1" fill="currentColor"/>
            <rect x="13" y="13" width="5" height="5" rx="1" fill="currentColor"/>
          </svg>
        </button>

        <div class="tsw-popup" id="tswPopup" role="dialog" aria-label="Uygulamalar" hidden>
          <p class="tsw-popup-label">Tessera Uygulamaları</p>

          <div class="tsw-apps">
            <a href="/forge" class="tsw-app-card">
              <div class="tsw-app-icon tsw-app-forge">
                <svg viewBox="0 0 20 20" width="22" height="22" fill="none"
                     stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                  <path d="M4 14l3-7 3 5 2-3 4 5"/>
                  <path d="M3 17h14"/>
                </svg>
              </div>
              <span class="tsw-app-name">Forge</span>
            </a>

            <a href="/archiver" class="tsw-app-card">
              <div class="tsw-app-icon tsw-app-mosaic">
                <svg viewBox="0 0 20 20" width="22" height="22" fill="none"
                     stroke="currentColor" stroke-width="1.6" aria-hidden="true">
                  <rect x="3" y="3" width="6" height="6" rx="1.2"/>
                  <rect x="11" y="3" width="6" height="6" rx="1.2"/>
                  <rect x="3" y="11" width="6" height="6" rx="1.2"/>
                  <rect x="11" y="11" width="6" height="6" rx="1.2"/>
                </svg>
              </div>
              <span class="tsw-app-name">Mosaic</span>
            </a>
          </div>

          <div class="tsw-popup-divider"></div>

          <a href="/settings" class="tsw-settings-link">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none"
                 stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <circle cx="8" cy="8" r="2.5"/>
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/>
            </svg>
            Ayarlar
          </a>
        </div>
      </div>

    </div>
  </header>

  <main class="shell">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  <script>
  // App switcher toggle
  (function () {
    var btn   = document.getElementById('tswBtn');
    var popup = document.getElementById('tswPopup');
    var wrap  = document.getElementById('tswWrap');
    if (!btn) return;
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var open = !popup.hidden;
      popup.hidden = open;
      btn.setAttribute('aria-expanded', String(!open));
    });
    document.addEventListener('click', function (e) {
      if (!wrap.contains(e.target)) {
        popup.hidden = true;
        btn.setAttribute('aria-expanded', 'false');
      }
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { popup.hidden = true; btn.setAttribute('aria-expanded', 'false'); }
    });
  })();
  </script>
</body>
</html>
